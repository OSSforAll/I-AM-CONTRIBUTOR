name: Auto-rebase contributors.json

# SECURITY: scripts are always executed from the base repo, never from forks.
# Only the contributors.json *data file* is read from PR branches.

on:
  # Fires when a contributor opens or updates their PR.
  # No paths filter — path filtering on pull_request_target is unreliable for fork PRs.
  pull_request_target:
    types: [opened, synchronize, reopened]

  # Fires when a PR is merged to main — syncs all remaining open PRs.
  push:
    branches:
      - main
    paths:
      - contributors.json

jobs:
  # ── Rebase the PR branch that just opened / was updated ──────────────────────
  rebase-pr:
    name: Rebase PR branch against main
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebase via Contents API
        uses: actions/github-script@v7
        with:
          script: |
            const { spawnSync } = require('child_process');
            const fs   = require('fs');
            const pr   = context.payload.pull_request;
            const { owner, repo } = context.repo;

            // 1. Check if contributors.json is in the PR's changed files
            const { data: files } = await github.rest.pulls.listFiles({
              owner, repo, pull_number: pr.number, per_page: 100
            });
            if (!files.some(f => f.filename === 'contributors.json')) {
              core.info('contributors.json not changed in this PR — skipping.');
              return;
            }

            const forkOwner = pr.head.repo?.owner?.login;
            const forkRepo  = pr.head.repo?.name;
            const prBranch  = pr.head.ref;
            if (!forkOwner || !forkRepo) {
              core.setFailed('Could not determine fork repo.');
              return;
            }

            // 2. Fetch the PR's contributors.json (read-only, no fork code runs)
            const run = (cmd, args) => {
              const r = spawnSync(cmd, args, { encoding: 'utf8' });
              if (r.status !== 0) throw new Error(`${cmd} ${args.join(' ')}\n${r.stderr}`);
              return r.stdout;
            };
            run('git', ['fetch', 'origin', `refs/pull/${pr.number}/head`, '--depth=1']);
            const prContent = run('git', ['show', 'FETCH_HEAD:contributors.json']);
            fs.writeFileSync('/tmp/pr-contributors.json', prContent);

            // 3. Compute conflict-free merge
            const merged = run('node', [
              '.github/scripts/merge-contributors.mjs',
              'contributors.json',
              '/tmp/pr-contributors.json'
            ]);

            // 4. Get the current file SHA from the fork branch (required by the API)
            const { data: existing } = await github.rest.repos.getContent({
              owner: forkOwner, repo: forkRepo,
              path: 'contributors.json', ref: prBranch
            });

            const currentContent = Buffer.from(existing.content, 'base64').toString('utf8');
            if (currentContent.trim() === merged.trim()) {
              core.info('Already up to date — nothing to push.');
              return;
            }

            // 5. Update the file via the Contents API.
            //    This works whenever "Allow edits from maintainers" is on.
            //    It adds a regular (non-force) commit on top of the fork branch's HEAD,
            //    updating contributors.json to the merged content.
            await github.rest.repos.createOrUpdateFileContents({
              owner: forkOwner, repo: forkRepo,
              path: 'contributors.json',
              message: 'chore: rebase contributors.json against main [skip ci]',
              content: Buffer.from(merged).toString('base64'),
              sha: existing.sha,
              branch: prBranch
            });

            core.info(`PR #${pr.number}: Updated contributors.json via Contents API.`);

      - name: Post comment if API update not possible
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { spawnSync } = require('child_process');
            const fs = require('fs');
            const pr = context.payload.pull_request;

            const run = (cmd, args) => {
              const r = spawnSync(cmd, args, { encoding: 'utf8' });
              return r.stdout;
            };
            run('git', ['fetch', 'origin', `refs/pull/${pr.number}/head`, '--depth=1']);
            const prContent = run('git', ['show', 'FETCH_HEAD:contributors.json']);
            fs.writeFileSync('/tmp/pr-contributors.json', prContent);
            const merged = run('node', [
              '.github/scripts/merge-contributors.mjs',
              'contributors.json',
              '/tmp/pr-contributors.json'
            ]).trim();

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: pr.number, per_page: 100
            });
            const bot = comments.find(
              c => c.user?.login === 'github-actions[bot]' && c.body?.includes('<!-- auto-rebase-bot -->')
            );
            const body = [
              "<!-- auto-rebase-bot -->",
              "⚠️ I tried to automatically update your `contributors.json` against `main` but couldn't.",
              "",
              "Please make sure **Allow edits from maintainers** is enabled on your PR, then close and reopen it to trigger the bot again.",
              "",
              "Or manually replace your `contributors.json` with the content below and push:",
              "",
              "```json",
              merged,
              "```"
            ].join('\n');

            if (bot) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: bot.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: pr.number, body });
            }

  # ── After a merge to main: sync ALL open PRs that touch contributors.json ─────
  sync-open-prs:
    name: Sync all open PRs after merge to main
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebase all open PRs touching contributors.json
        uses: actions/github-script@v7
        with:
          script: |
            const { spawnSync } = require('child_process');
            const fs = require('fs');
            const { owner, repo } = context.repo;

            const run = (cmd, args) => {
              const r = spawnSync(cmd, args, { encoding: 'utf8' });
              if (r.status !== 0) throw new Error(`${cmd} ${args.join(' ')}\n${r.stderr}`);
              return r.stdout;
            };

            const prs = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: 'open', base: 'main', per_page: 100
            });

            for (const pr of prs) {
              const { data: files } = await github.rest.pulls.listFiles({
                owner, repo, pull_number: pr.number, per_page: 100
              });
              if (!files.some(f => f.filename === 'contributors.json')) continue;

              const forkOwner = pr.head.repo?.owner?.login;
              const forkRepo  = pr.head.repo?.name;
              const prBranch  = pr.head.ref;
              if (!forkOwner || !forkRepo) continue;

              core.info(`Processing PR #${pr.number} (${forkOwner}/${forkRepo}/${prBranch})…`);

              // Fetch only the data file — no fork code runs
              run('git', ['fetch', 'origin', `refs/pull/${pr.number}/head`, '--depth=1']);
              const prContent = run('git', ['show', 'FETCH_HEAD:contributors.json']);
              const prFile = `/tmp/pr-${pr.number}.json`;
              fs.writeFileSync(prFile, prContent);

              // Compute conflict-free merge
              const merged = run('node', [
                '.github/scripts/merge-contributors.mjs',
                'contributors.json',
                prFile
              ]);

              // Update via Contents API (works when "Allow edits from maintainers" is on)
              let pushed = false;
              try {
                const { data: existing } = await github.rest.repos.getContent({
                  owner: forkOwner, repo: forkRepo,
                  path: 'contributors.json', ref: prBranch
                });
                const current = Buffer.from(existing.content, 'base64').toString('utf8');
                if (current.trim() === merged.trim()) {
                  core.info(`PR #${pr.number}: Already up to date.`);
                  pushed = true;
                } else {
                  await github.rest.repos.createOrUpdateFileContents({
                    owner: forkOwner, repo: forkRepo,
                    path: 'contributors.json',
                    message: 'chore: rebase contributors.json against main [skip ci]',
                    content: Buffer.from(merged).toString('base64'),
                    sha: existing.sha,
                    branch: prBranch
                  });
                  core.info(`PR #${pr.number}: Updated via Contents API.`);
                  pushed = true;
                }
              } catch (e) {
                core.warning(`PR #${pr.number}: Contents API failed (${e.status ?? e.message})`);
              }

              if (pushed) continue;

              // Fallback: post/update a comment with ready-to-paste content
              const { data: comments } = await github.rest.issues.listComments({
                owner, repo, issue_number: pr.number, per_page: 100
              });
              const bot = comments.find(
                c => c.user?.login === 'github-actions[bot]' && c.body?.includes('<!-- auto-rebase-bot -->')
              );
              const body = [
                "<!-- auto-rebase-bot -->",
                "⚠️ Another PR was just merged that also changed `contributors.json`. Your branch needs to be updated.",
                "",
                "Please make sure **Allow edits from maintainers** is enabled on your PR, then close and reopen it to trigger the bot again.",
                "",
                "Or manually replace your `contributors.json` with the content below and push:",
                "",
                "```json",
                merged.trim(),
                "```"
              ].join('\n');

              if (bot) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: bot.id, body });
                core.info(`PR #${pr.number}: Updated existing bot comment.`);
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body });
                core.info(`PR #${pr.number}: Posted new bot comment.`);
              }
            }